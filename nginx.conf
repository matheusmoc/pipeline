# Roteia todas as requisicoes HTTP recebidas na porta 80
# para o container da API FastAPI na porta 8000.
# Adiciona headers de seguranca em todas as respostas.

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Define o grupo de servidores upstream
    # O nome 'api' corresponde ao service no docker-compose
    upstream fastapi_app {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # Headers de seguranca
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Encaminha todas as requisicoes para a API
        location / {
            proxy_pass http://fastapi_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check do proprio Nginx
        location /nginx-health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
