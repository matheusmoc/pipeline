# Define os alvos que o Prometheus deve monitorar.
# A API FastAPI expoe metricas no endpoint /metrics
# que sao coletadas a cada 10 segundos.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Metricas do proprio Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # Metricas da API FastAPI
  - job_name: "fastapi"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "fastapi-api"
          environment: "production"
