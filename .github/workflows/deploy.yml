# GitHub Actions - Pipeline CI/CD
#
# Fluxo completo executado a cada push na branch main:
#   1. Lint (Ruff, Black, isort)
#   2. Testes (pytest)
#   3. Build da imagem Docker
#   4. Gerar tag SemVer + Short SHA do commit
#   5. Push para Docker Hub (tag versionada + latest)
#   6. Deploy via SSH no servidor de producao
#
# O deploy atualiza apenas o container da API,
# sem derrubar os demais servicos (Nginx, Prometheus, Dozzle).
#
# Secrets necessarios no repositorio:
#   DOCKER_USERNAME  - Usuario Docker Hub
#   DOCKER_PASSWORD  - Senha/Token Docker Hub
#   SERVER_IP        - IP do servidor de producao
#   SERVER_USER      - Usuario SSH do servidor
#   SSH_PRIVATE_KEY  - Chave privada SSH

name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/fastapi-seminario

jobs:
  # Etapa 1: Lint e Testes
  test:
    name: Executar Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint com Ruff
        run: ruff check app/

      - name: Verificar formatacao com Black
        run: black --check app/

      - name: Verificar imports com isort
        run: isort --check-only app/

      - name: Executar testes
        run: pytest app/tests/ -v --tb=short

  # Etapa 2: Build da imagem Docker e push para Docker Hub
  build-and-push:
    name: Build e Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      full_tag: ${{ steps.version.outputs.FULL_TAG }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar versao SemVer + Short SHA
        id: version
        run: |
          # Busca a ultima tag SemVer ou usa 0.0.0 como padrao
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          LATEST_TAG=${LATEST_TAG#v}

          # Incrementa o patch version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Short SHA do commit
          SHORT_SHA=$(git rev-parse --short HEAD)

          # Tag no formato VERSION-SHORT_SHA
          FULL_TAG="${VERSION}-${SHORT_SHA}"

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "FULL_TAG=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT

          echo "Versao: ${VERSION}"
          echo "Tag completa: ${FULL_TAG}"

      - name: Criar Tag Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.FULL_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do Build
        run: |
          echo "### Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.DOCKER_IMAGE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.FULL_TAG }}\` |" >> $GITHUB_STEP_SUMMARY

  # Etapa 3: Deploy no servidor via SSH
  deploy:
    name: Deploy Producao
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'DEPLOY_SCRIPT'
            echo "Iniciando deploy..."

            cd ~/fastapi-seminario || exit 1

            git pull origin master

            export DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.full_tag }}

            # Atualiza apenas o container da API sem derrubar os demais
            docker compose pull api
            docker compose up -d api

            sleep 5
            if docker compose ps api | grep -q "Up"; then
              echo "Deploy realizado com sucesso!"
              echo "Versao: ${{ needs.build-and-push.outputs.full_tag }}"
            else
              echo "Erro no deploy! Container nao esta running."
              docker compose logs api --tail=50
              exit 1
            fi
          DEPLOY_SCRIPT

      - name: Resumo do Deploy
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Servidor | \`${{ secrets.SERVER_IP }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Versao | \`${{ needs.build-and-push.outputs.full_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed |" >> $GITHUB_STEP_SUMMARY
