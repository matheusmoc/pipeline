# Orquestra os containers do projeto:
#   - api        : Aplicacao FastAPI (porta 8000)
#   - nginx      : Proxy reverso (porta 80)
#   - prometheus : Coleta de metricas (porta 9090)
#   - dozzle     : Visualizacao de logs Docker (porta 9999)

services:
  api:
    build: .
    image: ${DOCKER_IMAGE:-fastapi-seminario:latest}
    container_name: fastapi-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./app.db
    ports:
      - "8000:8000"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx como proxy reverso
  # Recebe as requisicoes na porta 80 e encaminha para a API na porta 8000
  nginx:
    image: nginx:alpine
    container_name: fastapi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  # Prometheus para coleta de metricas
  # Faz scrape do endpoint /metrics da API a cada 10 segundos
  prometheus:
    image: prom/prometheus:latest
    container_name: fastapi-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - app-network

  # Dozzle para visualizacao de logs em tempo real
  # Conecta ao Docker socket para ler os logs dos containers
  dozzle:
    image: amir20/dozzle:latest
    container_name: fastapi-dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  prometheus-data:
    driver: local
